<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          sans-serif;
        color: #121c2a;
        background: #fafaf9;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        text-align: center;
      }
      img {
        height: 40px;
        width: auto;
        margin-bottom: 1.5rem;
      }

        font-size: 1.5rem;
        margin: 0 0 0.5rem;
      }
      p {
        max-width: 28rem;
        color: #4a5566;
        margin: 0 0 1.5rem;
      }
      a {
        display: inline-flex;
        align-items: center;
        height: 2.75rem;
        padding: 0 1.5rem;
        background: #fd761a;
        color: white;
        text-decoration: none;
        border-radius: 0.5rem;
        font-weight: 500;
      }
      a:hover {
        background: #d65f0a;
      }

  <body>
    <img src="/logo-ma-papeterie.png" alt="Ma Papeterie" />
